version: '3.9'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backend/live_events.db:/app/live_events.db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  queue-workers:
    build:
      context: ./queue-workers
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - QUEUE_REDIS_URL=redis://redis:6379
      - BACKEND_API_URL=http://backend:8000
    depends_on:
      - redis
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000

volumes:
  redis-data:
