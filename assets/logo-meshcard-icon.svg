<?xml version="1.0" encoding="UTF-8"?>
<svg
  width="256"
  height="256"
  viewBox="0 0 256 256"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="mc-icon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="50%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <rect
    x="0"
    y="0"
    width="256"
    height="256"
    rx="64"
    fill="url(#mc-icon-gradient)"
  />

  <!-- Simple flashcard -->
  <g transform="translate(128,128) rotate(-8)">
    <rect
      x="-60"
      y="-40"
      width="120"
      height="80"
      rx="14"
      fill="#F9FAFB"
    />
    <rect
      x="-48"
      y="-26"
      width="70"
      height="8"
      rx="4"
      fill="#E5E7EB"
    />
    <rect
      x="-48"
      y="-10"
      width="50"
      height="8"
      rx="4"
      fill="#E5E7EB"
      opacity="0.8"
    />
    <!-- Small image block -->
    <rect
      x="10"
      y="-24"
      width="24"
      height="24"
      rx="6"
      fill="#DBEAFE"
      stroke="#60A5FA"
      stroke-width="2"
    />
    <polyline
      points="12,-10 18,-18 24,-14 30,-22"
      fill="none"
      stroke="#3B82F6"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
