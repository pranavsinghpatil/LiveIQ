<?xml version="1.0" encoding="UTF-8"?>
<svg
  width="512"
  height="512"
  viewBox="0 0 512 512"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="mc-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="50%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <filter id="mc-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <circle
    cx="256"
    cy="256"
    r="220"
    fill="url(#mc-gradient)"
    filter="url(#mc-shadow)"
  />

  <!-- Graph / brain nodes -->
  <!-- Edges -->
  <g stroke="#E5E7EB" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <line x1="190" y1="200" x2="260" y2="170" />
    <line x1="260" y1="170" x2="320" y2="210" />
    <line x1="190" y1="200" x2="210" y2="270" />
    <line x1="210" y1="270" x2="280" y2="290" />
    <line x1="320" y1="210" x2="340" y2="270" />
    <line x1="280" y1="290" x2="340" y2="270" />
  </g>

  <!-- Nodes -->
  <g fill="#F9FAFB" stroke="#0EA5E9" stroke-width="3">
    <circle cx="190" cy="200" r="11"/>
    <circle cx="260" cy="170" r="11"/>
    <circle cx="320" cy="210" r="11"/>
    <circle cx="210" cy="270" r="11"/>
    <circle cx="280" cy="290" r="11"/>
    <circle cx="340" cy="270" r="11"/>
  </g>

  <!-- Flashcard stack -->
  <g transform="translate(260,260) rotate(-10)">
    <!-- Back card -->
    <rect
      x="-70"
      y="-60"
      width="140"
      height="100"
      rx="14"
      fill="#1E293B"
      opacity="0.55"
    />
    <!-- Middle card -->
    <rect
      x="-80"
      y="-70"
      width="140"
      height="100"
      rx="14"
      fill="#0F172A"
      opacity="0.85"
    />
    <!-- Front card -->
    <rect
      x="-90"
      y="-80"
      width="140"
      height="100"
      rx="14"
      fill="#F9FAFB"
    />
    <!-- Front card content -->
    <rect
      x="-80"
      y="-65"
      width="90"
      height="10"
      rx="5"
      fill="#E5E7EB"
    />
    <rect
      x="-80"
      y="-45"
      width="70"
      height="10"
      rx="5"
      fill="#E5E7EB"
      opacity="0.8"
    />
    <rect
      x="-80"
      y="-25"
      width="50"
      height="10"
      rx="5"
      fill="#E5E7EB"
      opacity="0.6"
    />
    <!-- Small image placeholder square -->
    <rect
      x="5"
      y="-55"
      width="30"
      height="30"
      rx="6"
      fill="#DBEAFE"
      stroke="#60A5FA"
      stroke-width="2"
    />
    <polyline
      points="10,-35 18,-45 26,-40 32,-50"
      fill="none"
      stroke="#3B82F6"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- Text mark (optional, works when used bigger than 64x64) -->
  <text
    x="256"
    y="410"
    text-anchor="middle"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif"
    font-size="32"
    fill="#F9FAFB"
    opacity="0.96"
  >
    MeshCards
  </text>
</svg>
