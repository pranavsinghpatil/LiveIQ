<?xml version="1.0" encoding="UTF-8"?>
<svg
  width="1600"
  height="400"
  viewBox="0 0 1600 400"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="mc-bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="40%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <linearGradient id="mc-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="50%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>

    <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect
    x="0"
    y="0"
    width="1600"
    height="400"
    fill="url(#mc-bg-gradient)"
  />

  <!-- Glow shapes -->
  <circle cx="280" cy="220" r="190" fill="#4F46E5" opacity="0.18" filter="url(#soft-glow)"/>
  <circle cx="1350" cy="80" r="150" fill="#0EA5E9" opacity="0.18" filter="url(#soft-glow)"/>

  <!-- Left: logo mark (reuse concept from main logo) -->
  <g transform="translate(200,200)">
    <circle cx="0" cy="0" r="120" fill="url(#mc-accent)"/>
    <!-- Graph nodes -->
    <g stroke="#E5E7EB" stroke-width="3" opacity="0.9">
      <line x1="-40" y1="-20" x2="10" y2="-40"/>
      <line x1="10" y1="-40" x2="50" y2="-10"/>
      <line x1="-40" y1="-20" x2="-25" y2="30"/>
      <line x1="-25" y1="30" x2="25" y2="45"/>
      <line x1="50" y1="-10" x2="45" y2="35"/>
      <line x1="25" y1="45" x2="45" y2="35"/>
    </g>
    <g fill="#F9FAFB" stroke="#0EA5E9" stroke-width="2.5">
      <circle cx="-40" cy="-20" r="8"/>
      <circle cx="10" cy="-40" r="8"/>
      <circle cx="50" cy="-10" r="8"/>
      <circle cx="-25" cy="30" r="8"/>
      <circle cx="25" cy="45" r="8"/>
      <circle cx="45" cy="35" r="8"/>
    </g>

    <!-- Flashcard with image thumbnail -->
    <g transform="translate(0,10) rotate(-8)">
      <rect x="-65" y="-45" width="130" height="90" rx="16" fill="#0F172A" opacity="0.65"/>
      <rect x="-75" y="-55" width="130" height="90" rx="16" fill="#F9FAFB"/>
      <rect x="-62" y="-40" width="70" height="10" rx="5" fill="#E5E7EB"/>
      <rect x="-62" y="-22" width="50" height="10" rx="5" fill="#E5E7EB" opacity="0.85"/>
      <rect x="-62" y="-4" width="40" height="10" rx="5" fill="#E5E7EB" opacity="0.7"/>

      <rect x="10" y="-34" width="28" height="28" rx="6" fill="#DBEAFE" stroke="#60A5FA" stroke-width="2"/>
      <polyline
        points="12,-18 18,-26 24,-22 30,-30"
        fill="none"
        stroke="#3B82F6"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </g>
  </g>

  <!-- Right: Title & tagline -->
  <g transform="translate(430,140)">
    <text
      x="0"
      y="0"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif"
      font-size="52"
      font-weight="700"
      fill="#F9FAFB"
    >
      MeshCards
    </text>

    <text
      x="0"
      y="52"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif"
      font-size="22"
      fill="#E5E7EB"
    >
      Turn your notes into AI-powered Anki decks — with optional images.
    </text>

    <text
      x="0"
      y="102"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif"
      font-size="17"
      fill="#9CA3AF"
    >
      • Personalized flashcards from your own knowledge
    </text>
    <text
      x="0"
      y="130"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif"
      font-size="17"
      fill="#9CA3AF"
    >
      • Optional Nano Banana image generation per deck or card type
    </text>
    <text
      x="0"
      y="158"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif"
      font-size="17"
      fill="#9CA3AF"
    >
      • Export directly to .apkg and study in Anki
    </text>
  </g>

  <!-- Bottom-right subtle label -->
  <text
    x="1540"
    y="370"
    text-anchor="end"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif"
    font-size="14"
    fill="#6B7280"
  >
    MeshCards · AI + Anki + Images
  </text>
</svg>
